# Optional autoscaling for the backend.
# Requires metrics-server. Do not apply this for the basic demo unless
# metrics-server is installed and reporting CPU metrics.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pollisense-backend
  namespace: pollisense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pollisense-backend
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
