apiVersion: apps/v1
kind: Deployment
metadata:
  name: pollisense-frontend
  namespace: pollisense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pollisense-frontend
  template:
    metadata:
      labels:
        app: pollisense-frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: pollisense-frontend:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsUser: 101
            runAsGroup: 101
            runAsNonRoot: true
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pollisense-frontend
  namespace: pollisense
spec:
  type: ClusterIP
  selector:
    app: pollisense-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
