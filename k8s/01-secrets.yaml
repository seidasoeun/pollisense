apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: pollisense
type: Opaque
# Demo-only values for reproducible course runs.
# Production or real deployments should generate secrets per environment.
# Real secrets should not be committed to Git; use scripts/create-k8s-secrets.sh
# or a cluster secret manager instead.
stringData:
  POSTGRES_DB: pollisense
  POSTGRES_USER: pollisense
  POSTGRES_PASSWORD: pollisense
---
apiVersion: v1
kind: Secret
metadata:
  name: ingestion-secret
  namespace: pollisense
type: Opaque
# Demo-only ingestion token for reproducible course runs.
# Production or real deployments should generate this per environment.
# Real secrets should not be committed to Git.
stringData:
  INGESTION_TOKEN: local-demo-token
