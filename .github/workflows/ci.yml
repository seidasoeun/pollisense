name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build backend
        working-directory: pollisense-backend
        run: bash ./mvnw package

      - name: Build simulator
        working-directory: pollisense-simulator
        run: bash ./mvnw package

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: pollisense-frontend/package-lock.json

      - name: Build frontend
        working-directory: pollisense-frontend
        run: |
          npm ci
          npm run build

      - name: Docker build backend
        run: docker build -t pollisense-backend:ci ./pollisense-backend

      - name: Docker build simulator
        run: docker build -t pollisense-simulator:ci ./pollisense-simulator

      - name: Docker build frontend
        run: docker build -t pollisense-frontend:ci ./pollisense-frontend
